server {
    listen 80;
    server_name _;

    # Allow large audio uploads (WAV/MP3 can be tens of MB).
    client_max_body_size 100m;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy the API to the backend container. The backend serves its
    # routes at the root, so strip the /api prefix (/api/upload -> /upload).
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # YouTube downloads / analysis can take a while.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
